version: '3'

tasks:
  install:
    desc: Install npm dependencies
    cmds:
      - npm install

  dev:
    desc: Start Remotion Studio
    cmds:
      - npm run dev

  build:
    desc: Bundle the Remotion project
    cmds:
      - npm run build

  lint:
    desc: Run lint and type checks
    cmds:
      - npm run lint

  render:
    desc: Render video with Remotion
    cmds:
      - npx remotion render
