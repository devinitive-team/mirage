version: '3'

tasks:
  install:
    desc: Install npm dependencies
    cmds:
      - npm install

  dev:
    desc: Start Remotion Studio
    cmds:
      - npm run dev

  build:
    desc: Bundle the Remotion project
    cmds:
      - npm run build

  lint:
    desc: Run lint and type checks
    cmds:
      - npm run lint

  compositions:
    desc: List available Remotion compositions
    cmds:
      - npx remotion compositions src/index.ts --port=3041

  render:
    desc: Render default composition to out/promo.mp4
    cmds:
      - mkdir -p out
      - npx remotion render --port=3041 src/index.ts promo out/promo.mp4
