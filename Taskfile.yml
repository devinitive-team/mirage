version: "3"

includes:
  srv:
    taskfile: srv/Taskfile.yml
    dir: srv
  web:
    taskfile: web/Taskfile.yml
    dir: web
  marketing:
    taskfile: marketing/Taskfile.yml
    dir: marketing

tasks:
  setup:
    desc: Install all dependencies
    cmds:
      - task: srv:install
      - task: web:install

  build:
    desc: Build all projects
    cmds:
      - task: srv:build
      - task: web:build

  test:
    desc: Run all tests
    cmds:
      - task: srv:test
      - task: web:test

  format:
    desc: Format all projects
    cmds:
      # - task: srv:format
      - task: web:format

  lint:
    desc: Lint all projects
    cmds:
      - task: srv:lint
      - task: web:lint

  typecheck:
    desc: Run TypeScript type checks
    cmds:
      - task: web:typecheck

  codegen:
    desc: Generate TypeScript types from the OpenAPI spec
    cmds:
      - task: web:codegen

  run:
    desc: Run server and frontend in dev mode
    deps:
      - srv:run
      - web:dev
