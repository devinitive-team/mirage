version: "3"

includes:
  srv:
    taskfile: srv/Taskfile.yml
    dir: srv
  web:
    taskfile: web/Taskfile.yml
    dir: web
  marketing:
    taskfile: marketing/Taskfile.yml
    dir: marketing
  video:
    taskfile: video/Taskfile.yml
    dir: video
  email:
    taskfile: email/Taskfile.yml
    dir: email

tasks:
  setup:
    desc: Install all dependencies
    cmds:
      - task: srv:install
      - task: web:install
      - task: marketing:install
      - task: email:install
      - task: video:install

  build:
    desc: Build all projects
    cmds:
      - task: srv:build
      - task: web:build
      - task: marketing:build
      - task: video:build

  test:
    desc: Run all tests
    cmds:
      - task: srv:test
      - task: web:test

  format:
    desc: Format all projects
    cmds:
      - task: web:format

  lint:
    desc: Lint all projects
    cmds:
      - task: srv:lint
      - task: web:lint
      - task: video:lint

  typecheck:
    desc: Run TypeScript type checks
    cmds:
      - task: web:typecheck
      - task: email:typecheck

  codegen:
    desc: Generate TypeScript types from the OpenAPI spec
    cmds:
      - task: web:codegen

  dev:
    desc: Run server and frontend in dev mode
    deps:
      - srv:dev
      - web:dev
