version: '3'

tasks:
  install:
    desc: Download Go modules
    cmds:
      - go mod download

  build:
    desc: Build the server binary
    cmds:
      - go build -o dist/mirage ./cmd/mirage

  dev:
    desc: Run the server in dev mode
    dotenv: ['.env']
    cmds:
      - go run ./cmd/mirage run

  openapi:
    desc: Generate OpenAPI spec
    cmds:
      - go run ./cmd/mirage openapi > openapi.json

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: Run static analysis
    cmds:
      - go vet ./...

  clean:
    desc: Remove data directory
    cmds:
      - rm -rf data/
