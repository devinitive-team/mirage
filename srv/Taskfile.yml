version: '3'

tasks:
  install:
    desc: Download Go modules
    cmds:
      - go mod download

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  run:
    desc: Run the server
    cmds:
      - go run ./cmd/mirage

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: Run static analysis
    cmds:
      - go vet ./...

  clean:
    desc: Remove data directory
    cmds:
      - rm -rf data/
