version: '3'

tasks:
  install:
    desc: Install npm dependencies
    cmds:
      - npm install

  build:
    desc: Build for production
    cmds:
      - npm run build

  dev:
    desc: Start dev server
    cmds:
      - npm run dev

  test:
    desc: Run tests
    cmds:
      - npm run test

  format:
    desc: Run formatter
    cmds:
      - npm run format

  lint:
    desc: Run biome linter
    cmds:
      - npm run lint

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - npx tsc --noEmit

  check:
    desc: Run check
    cmds:
      - npm run check

  codegen:
    desc: Generate TypeScript types from the OpenAPI spec
    cmds:
      - cd ../srv && go run ./cmd/mirage openapi > /tmp/mirage.openapi.json
      - npx openapi-typescript /tmp/mirage.openapi.json -o src/lib/api.gen.ts
